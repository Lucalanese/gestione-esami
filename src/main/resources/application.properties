spring.application.name=gestione-esami
server.port=23110

spring.datasource.url=jdbc:postgreql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:esami_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:esami_user}
spring.datasource.password=${DB_PASSWORD:esami_pass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# JWT - Chiave pubblica RSA di Mauro
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:public.pem